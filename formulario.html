<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contato pelo WhatsApp | ALGdivulga+</title>
    <meta
      name="description"
      content="Envie uma descrição rápida do que você precisa e fale com a ALGdivulga+ pelo WhatsApp."
    >
    <link rel="icon" type="image/png" href="assets/favicon-logo.png">
    <style>
      :root {
        --ink: #111111;
        --paper: #ffffff;
        --muted: #f3eee6;
        --line: #ded3c4;
        --gold: #b88a4a;
        --whatsapp: #25d366;
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100svh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        color: var(--ink);
        background:
          linear-gradient(135deg, rgba(243, 238, 230, 0.92), rgba(255, 255, 255, 0.96)),
          var(--paper);
        font-family: Inter, Montserrat, Poppins, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 460px);
        padding: 24px;
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: 0 24px 70px rgba(11, 11, 11, 0.14);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: inherit;
        text-decoration: none;
      }

      .brand img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border: 1px solid var(--ink);
        border-radius: 50%;
      }

      .brand strong {
        display: block;
        line-height: 1.15;
      }

      .brand small {
        color: #625c52;
      }

      .close-link {
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        color: var(--ink);
        background: var(--muted);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        font-size: 1.2rem;
        font-weight: 700;
        line-height: 1;
        text-decoration: none;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.55rem;
        line-height: 1.15;
      }

      p {
        margin: 0 0 20px;
        color: #625c52;
        line-height: 1.55;
      }

      label {
        display: grid;
        gap: 8px;
        margin-bottom: 16px;
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 132px;
        padding: 12px;
        color: var(--ink);
        background: #fbf8f3;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        resize: vertical;
        font: inherit;
      }

      textarea:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 4px rgba(184, 138, 74, 0.14);
        outline: none;
      }

      button {
        width: 100%;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #ffffff;
        background: #111111;
        border: 0;
        border-radius: var(--radius);
        cursor: pointer;
        font: inherit;
        font-weight: 700;
      }

      button::before {
        content: "";
        width: 14px;
        height: 14px;
        background: var(--whatsapp);
        border-radius: 50%;
      }

      .note {
        min-height: 22px;
        margin: 12px 0 0;
        color: #625c52;
        font-size: 0.92rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="topbar">
        <a class="brand" href="index.html" aria-label="Voltar para a página inicial da ALGdivulga+">
          <img src="assets/LOGO-2.png" alt="">
          <span>
            <strong>ALGdivulga+</strong>
            <small>Contato rápido</small>
          </span>
        </a>
        <a class="close-link" href="index.html" aria-label="Fechar formulário">x</a>
      </div>

      <h1>Do que você precisa?</h1>
      <p>Descreva rapidamente seu projeto e abra uma conversa pronta no WhatsApp.</p>

      <form id="whatsapp-form">
        <label for="descricao">
          Descrição
          <textarea
            id="descricao"
            name="descricao"
            placeholder="Exemplo: quero uma landing page para divulgar meus serviços..."
            required
          ></textarea>
        </label>
        <button type="submit">Enviar descrição</button>
        <p class="note" id="form-note" aria-live="polite"></p>
      </form>
    </main>

    <script>
      const form = document.querySelector("#whatsapp-form");
      const textarea = document.querySelector("#descricao");
      const note = document.querySelector("#form-note");
      const whatsappNumber = "5598991856123";

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const descricao = textarea.value.trim();

        if (!descricao) {
          note.textContent = "Digite uma descrição antes de enviar.";
          textarea.focus();
          return;
        }

        const message = encodeURIComponent(`Olá, quero solicitar um orçamento. ${descricao}`);
        window.open(`https://wa.me/${whatsappNumber}?text=${message}`, "_blank", "noopener");
        note.textContent = "Mensagem pronta. O WhatsApp foi aberto para envio.";
      });
    </script>
  </body>
</html>
