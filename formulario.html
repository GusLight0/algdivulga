    <!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato WhatsApp</title>
    <style>
        /* Fundo com gradiente */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            font-family: Arial, sans-serif;
        }

        /* Card central */
        .card {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 90%;
            max-width: 400px;
            position: relative; /* Para posicionar o X dentro */
        }

        /* Ícone de fechar */
        .close-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 18px;
            color: #888;
        }

        .close-icon a {
            text-decoration: none;
            color: rgb(99, 99, 99);
            font-weight: 800;
        }

        .close-icon a:hover {
            color: #3d3d3d;
        }

        .card h2 {
            margin-top: 10px;
            color: #333;
        }

        .card p {
            color: #25D366;
            font-weight: 600;
            margin-top: -20px;
            margin-bottom: 40px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            resize: none;
            font-size: 16px;
        }

        .whatsapp-button {
            background-color: #25D366;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .whatsapp-button:hover {
            background-color: #1ebe5d;
            transform: scale(1.05);
        }

        .whatsapp-icon {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Ícone de fechar -->
        <div class="close-icon"><a href="/index.html">X</a></div>

        <h2>Do que você precisa?</h2>
        <p>(suporte pelo Whatz)</p>
        <textarea id="descricao" placeholder="coloque aqui as informações"></textarea>
        <br>
        <button class="whatsapp-button" onclick="enviarParaWhatsApp()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp" class="whatsapp-icon">
            Enviar Descrição
        </button>
    </div>

    <script>
        function enviarParaWhatsApp() {
            var descricao = document.getElementById('descricao').value.trim();

            if (descricao === "") {
                alert("Por favor, digite uma mensagem antes de enviar.");
                return;
            }

            var textoFormatado = encodeURIComponent(descricao);
            var numero = '5598991856123'; // <<< Troque aqui pelo seu número real

            var link = "https://wa.me/" + numero + "?text=" + textoFormatado;
            window.open(link, '_blank');
        }
    </script>

</body>
</html>
</html>
